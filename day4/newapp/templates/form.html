<!DOCTYPE html>
<html>
<head>
<title>Enter Username</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#4facfe;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2f80ed;
}

</style>

</head>

<body>
    <div class="container">
        <h2>Enter Username</h2>

        <form method="GET">
            <input type="text" name="User" placeholder="Username" required>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
