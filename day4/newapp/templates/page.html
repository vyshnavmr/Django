<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Username Input</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 300px;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        background: #2575fc;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
    }

    button:hover {
        background: #1a5edb;
    }
</style>

</head>

<body>

    
    <div class="container">
        <h2>Enter Username</h2>
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="user" placeholder="Username" required>
            <br>
            <input type="text" name="color" placeholder="Color" required>
            <button type="submit">Submit</button>
        </form>

    </div>

</body>
</html>
