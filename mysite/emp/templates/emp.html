<!DOCTYPE html>
<html>
<head>
    <title>Employee Directory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .employee {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }

        .full-time {
            color: green;
            font-weight: bold;
        }

        .part-time {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1><u>Employee Directory</u></h1>

{% if employees %}
    {% for emp in employees %}
        <div class="employee">
            <h3>{{ emp.name }}</h3>

            <p>Job Title: {{ emp.job_title }}</p>

            <p>Salary: ₹{{ emp.salary }}</p>

            {% if emp.is_full_time %}
                <p class="full-time">Full-Time</p>
            {% else %}
                <p class="part-time">Part-Time</p>
            {% endif %}

        </div>
    {% endfor %}

{% else %}
    <p>No employees available.</p>
{% endif %}

</body>
</html>
