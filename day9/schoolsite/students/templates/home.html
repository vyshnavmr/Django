{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Students</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<h1>Student List</h1>

<ul>
    {% for student in students %}
        <li>
            {{ student.name }}
            <a href="/result/{{ student.name }}/">
                View Result
            </a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
